<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>BugBusters-fy</title>
  </head>
  <body>
    <div class="pageLayout open">
      <header class="header">
        <!-- !delete after test -->
        <button class="btn">
          <svg>
            <use href="./sprite.svg#home-mob"></use>
          </svg>
        </button>
      </header>
      <aside class="sideNavbar"></aside>
      <main class="main">
        <section class="filter"></section>
        <!----- ---recent section for mobile ----->
        <section class="recent">
          <div class="recent-container">
            <div class="music-card">
              <img
                src="./assets/images/daftpunk.png"
                alt="Random Access Memories"
              />
              <div class="text-container">
                <h3>Get Lucky</h3>
                <p>(feat. Pharrell Williams and Nile Rodgers)</p>
              </div>
            </div>
            <div class="music-card">
              <img src="./assets/images/dailymix2.png" alt="Daily Mix 2" />
              <div class="text-container">
                <h3>Daily Mix 2</h3>
              </div>
            </div>
            <div class="music-card">
              <img src="./assets/images/dalymix1.png" alt="Daily Mix 1" />
              <div class="text-container">
                <h3>Daily Mix 1</h3>
              </div>
            </div>
            <div class="music-card">
              <img src="./assets/images/daftpunk.png" alt="Instant Crush" />
              <div class="text-container">
                <h3>Instant Crush</h3>
                <p>Daft Punk</p>
              </div>
            </div>
            <div class="music-card">
              <img src="./assets/images/daftpunk.png" alt="Get Lucky" />
              <div class="text-container">
                <h3>Around the world</h3>
                <p>Daft Punk</p>
              </div>
            </div>
            <div class="music-card">
              <img src="./assets/images/rockmix.png" alt="Rock Mix" />
              <div class="text-container">
                <h3>Rock Mix</h3>
              </div>
            </div>
          </div>
        </section>
        <section class="forYou"></section>
        <section class="topMixes"></section>
        <section class="favoriteArtists"></section>
        <section class="AlbumsForYou"></section>
        <section class="audioBooks"></section>
        <section class="podcasts"></section>
        <section class="episodes"></section>
      </main>
      <aside class="sidePopup"></aside>
      <footer class="footer"></footer>
    </div>
  </body>
</html>
